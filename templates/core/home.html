{% extends 'core/base.html' %}
{% block content %}

<div class="text-center mb-4">
    <h2>Welcome to Quiz App 🎯</h2>
    <p>Select a category to start</p>
</div>

<div class="row">
    {% for category in categories %}
    <div class="col-md-4">
        <div class="card mb-4 text-center">
            <div class="card-body">
                <h5>{{ category.name }}</h5>
                <a href="{% url 'category_quizzes' category.id %}" class="btn btn-primary">
                    View Quizzes
                </a>
            </div>
        </div>
    </div>
    {% endfor %}
</div>

{% endblock %}
