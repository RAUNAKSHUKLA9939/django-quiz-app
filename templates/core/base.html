 {% load static %}
<!DOCTYPE html>
<html>
 <head>
    <title>Quiz App</title>

    <!-- Bootstrap 4 -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">

    <!-- Custom CSS -->
    {% load static %}
    <link rel="stylesheet" href="{% static 'core/style.css' %}">

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <a class="navbar-brand" href="{% url 'home' %}">Quiz App</a>

  <div class="ml-auto d-flex align-items-center">

    {% if user.is_authenticated %}
        <a class="nav-link text-white" href="{% url 'my_attempts' %}">My Attempts</a>

        <span class="text-white mr-3">Hello, {{ user.username }}</span>

        <a href="{% url 'logout' %}" class="btn btn-danger btn-sm">Logout</a>

    {% else %}
        <a href="{% url 'login' %}" class="btn btn-success btn-sm mr-2">Login</a>

        <!-- ✅ FIXED HERE -->
        <a href="{% url 'signup' %}" class="btn btn-primary btn-sm">Register</a>

    {% endif %}

  </div>
</nav>

<div class="container mt-4">

    {% for message in messages %}
        <div class="alert alert-{{ message.tags }}">
            {{ message }}
        </div>
    {% endfor %}

    {% block content %}{% endblock %}

</div>

</body>
</html>
