<!DOCTYPE html>
<html>
<head>
    <title>Quiz App</title>

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <a class="navbar-brand" href="{% url 'home' %}">Quiz App</a>

  <div class="ml-auto">
    {% if user.is_authenticated %}
        <span class="text-white mr-3">Hello, {{ user.username }}</span>
        <a href="{% url 'logout' %}" class="btn btn-danger btn-sm">Logout</a>
    {% else %}
        <a href="{% url 'login' %}" class="btn btn-success btn-sm">Login</a>
        <a href="{% url 'register' %}" class="btn btn-primary btn-sm">Register</a>
    {% endif %}
  </div>
</nav>

<div class="container mt-4">

    {% for message in messages %}
        <div class="alert alert-{{ message.tags }}">
            {{ message }}
        </div>
    {% endfor %}

    {% block content %}{% endblock %}

</div>

</body>
</html>
