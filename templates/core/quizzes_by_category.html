{% extends 'core/base.html' %}
{% block content %}

<h2 class="mb-4">Available Quizzes</h2>

<div class="row">
    {% for quiz in quizzes %}
    <div class="col-md-6">
        <div class="card mb-4">
            <div class="card-body">
                <h5>{{ quiz.title }}</h5>

                {% if user.is_authenticated %}
                    <a href="{% url 'start_quiz' quiz.id %}" class="btn btn-success">
                        Start Quiz
                    </a>
                {% else %}
                    <a href="{% url 'login' %}" class="btn btn-secondary">
                        Login to Start
                    </a>
                {% endif %}
            </div>
        </div>
    </div>
    {% endfor %}
</div>

{% endblock %}
