{% extends 'core/base.html' %}
{% block content %}
<div class="alert alert-warning text-center" id="timer" style="font-size: 20px;"></div>

<div class="card p-4 shadow-sm">

    <!-- TIMER -->
    <div class="alert alert-warning text-center" id="timer" style="font-size: 20px;"></div>

    <h4>Question {{ question_number }} of {{ total_questions }}</h4>
    <p class="lead">{{ question.text }}</p>

    <form method="post" id="quiz-form">
        {% csrf_token %}

        {% for option in options %}
        <div class="form-check mb-2">
            <input class="form-check-input" type="radio" name="option"
                   id="option{{ option.id }}" value="{{ option.id }}">
            <label class="form-check-label" for="option{{ option.id }}">
                {{ option.text }}
            </label>
        </div>
        {% endfor %}

        <button type="submit" class="btn btn-primary mt-3">Next</button>
    </form>
</div>

<!-- TIMER SCRIPT -->
<script>
    let totalTime = 60;  // change if needed
    let timerElement = document.getElementById("timer");

    function updateTimer() {
        let minutes = Math.floor(totalTime / 60);
        let seconds = totalTime % 60;

        timerElement.innerText =
            `Time Left: ${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;

        if (totalTime <= 0) {
            clearInterval(timerInterval);
            alert("Time's up! Submitting...");
            document.getElementById("quiz-form").submit();
        }

        totalTime--;
    }

    let timerInterval = setInterval(updateTimer, 1000);
</script>
{% endblock %}
