{% extends 'core/base.html' %}
{% block content %}

<h3>Manage Users</h3>

<a href="{% url 'admin_add_user' %}" class="btn btn-primary mb-3">Add User</a>
<a href="{% url 'upload_users_csv' %}" class="btn btn-secondary mb-3">Upload CSV</a>

<table class="table table-bordered">
<tr>
<th>Username</th>
<th>Email</th>
<th>Actions</th>
</tr>

{% for user in users %}
<tr>
<td>{{ user.username }}</td>
<td>{{ user.email }}</td>
<td>
<a href="{% url 'edit_user' user.id %}" class="btn btn-warning btn-sm">Edit</a>
<a href="{% url 'delete_user' user.id %}" class="btn btn-danger btn-sm">Delete</a>
</td>
</tr>
{% endfor %}

</table>

{% endblock %}
