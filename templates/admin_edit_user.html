{% extends 'core/base.html' %}
{% block content %}

<h3>Edit User</h3>

<form method="post">
{% csrf_token %}
<input type="text" name="username" value="{{ user.username }}" class="form-control mb-2">
<input type="email" name="email" value="{{ user.email }}" class="form-control mb-2">
<input type="password" name="password" placeholder="New Password" class="form-control mb-2">
<button class="btn btn-success">Update</button>
</form>

{% endblock %}
